# ============================================================
# Example: ArcGIS Server CLI
# Generated by: clify scan --from url https://gis.example.com/arcgis/rest/services
# Then curated by the product team.
# ============================================================

meta:
  name: arcgis-server
  version: "0.1.0"
  description: "CLI for ArcGIS Server geoprocessing and map services"
  author: "Esri"
  license: "Apache-2.0"
  homepage: "https://developers.arcgis.com"

transport:
  type: rest
  base_url: "https://gis.example.com/arcgis/rest/services"
  timeout: 60
  retries: 2
  headers:
    Accept: "application/json"

auth:
  type: oauth2
  grant: client_credentials
  token_url: "https://www.arcgis.com/sharing/rest/generateToken"
  env_client_id: ARCGIS_CLIENT_ID
  env_client_secret: ARCGIS_CLIENT_SECRET
  custom:
    token_field: "token"
    expiry_field: "expires"
    content_type: form
    extra_params:
      f: "json"
      referer: "https://www.arcgis.com"

output:
  default_format: json
  pretty: true
  table:
    style: rounded

groups:
  - name: analysis
    description: "Spatial analysis and geoprocessing tools"
  - name: data
    description: "Data management and feature services"
  - name: services
    description: "Service administration and info"

commands:
  # ---- Analysis Group ----

  - name: buffer
    description: "Create buffer zones around features"
    group: analysis
    aliases: ["buf"]
    request:
      method: POST
      path: "/Analysis/GPServer/Buffer/execute"
      content_type: form
    params:
      - name: input
        type: file
        required: true
        description: "Input features (GeoJSON file or feature service URL)"
        short: "i"
        source: body
        file_type: both
      - name: distance
        type: float
        required: true
        description: "Buffer distance"
        short: "d"
        source: body
        validation:
          min: 0
      - name: units
        type: enum
        description: "Distance units"
        short: "u"
        default: "meters"
        values: ["meters", "feet", "miles", "kilometers", "yards", "nautical-miles"]
        source: body
      - name: dissolve
        type: enum
        description: "Dissolve type for overlapping buffers"
        default: "none"
        values: ["none", "dissolve"]
        source: body
      - name: ring-type
        type: enum
        description: "Ring type"
        default: "disk"
        values: ["disk", "ring"]
        source: body
      - name: f
        type: string
        description: "Response format"
        default: "json"
        source: query
        hidden: true
    response:
      success_path: "results"
      error_path: "error.message"
    examples:
      - description: "Buffer roads by 100 meters"
        command: "arcgis-server analysis buffer -i roads.geojson -d 100 -u meters"
      - description: "Buffer with dissolve"
        command: "arcgis-server analysis buffer -i parcels.geojson -d 500 --dissolve dissolve"

  - name: overlay
    description: "Overlay two feature layers (intersect, union, erase)"
    group: analysis
    request:
      method: POST
      path: "/Analysis/GPServer/Overlay/execute"
      content_type: form
    params:
      - name: input
        type: file
        required: true
        description: "Input feature layer"
        short: "i"
        source: body
      - name: overlay-layer
        type: file
        required: true
        description: "Overlay feature layer"
        short: "l"
        source: body
      - name: type
        type: enum
        required: true
        description: "Overlay type"
        short: "t"
        values: ["intersect", "union", "erase"]
        source: body
      - name: f
        type: string
        default: "json"
        source: query
        hidden: true
    response:
      success_path: "results"
      error_path: "error.message"
    examples:
      - description: "Intersect parcels with flood zones"
        command: "arcgis-server analysis overlay -i parcels.geojson -l floodzone.geojson -t intersect"

  # ---- Data Group ----

  - name: query
    description: "Query features from a feature service"
    group: data
    aliases: ["q"]
    request:
      method: GET
      path: "/{service}/FeatureServer/{layer}/query"
    params:
      - name: service
        type: string
        required: true
        description: "Service name"
        source: path
      - name: layer
        type: integer
        required: true
        description: "Layer index"
        default: 0
        source: path
      - name: where
        type: string
        description: "SQL where clause"
        short: "w"
        default: "1=1"
        source: query
      - name: fields
        type: string
        description: "Comma-separated field names (default: all)"
        short: "f"
        default: "*"
        source: query
      - name: geometry
        type: string
        description: "Spatial filter geometry (JSON envelope or polygon)"
        short: "g"
        source: query
      - name: spatial-rel
        type: enum
        description: "Spatial relationship"
        default: "intersects"
        values: ["intersects", "contains", "crosses", "envelope-intersects", "overlaps", "touches", "within"]
        source: query
      - name: return-geometry
        type: boolean
        description: "Include geometry in results"
        default: true
        source: query
      - name: result-offset
        type: integer
        description: "Skip N features"
        source: query
      - name: result-count
        type: integer
        description: "Max features to return"
        source: query
    response:
      success_path: "features"
      error_path: "error.message"
      pagination:
        type: offset
        param: "resultOffset"
        page_size_param: "resultRecordCount"
        default_page_size: 1000
        total_path: "count"
    examples:
      - description: "Query all roads"
        command: "arcgis-server data query --service Transportation --layer 0 -w \"TYPE='highway'\""
      - description: "Query with spatial filter"
        command: "arcgis-server data query --service Parcels --layer 0 -g '{\"xmin\":-118,\"ymin\":34,\"xmax\":-117,\"ymax\":35}'"

  - name: export
    description: "Export features to a local file"
    group: data
    request:
      method: GET
      path: "/{service}/FeatureServer/{layer}/query"
    params:
      - name: service
        type: string
        required: true
        description: "Service name"
        source: path
      - name: layer
        type: integer
        required: true
        description: "Layer index"
        default: 0
        source: path
      - name: where
        type: string
        description: "SQL where clause"
        short: "w"
        default: "1=1"
        source: query
      - name: format
        type: enum
        description: "Output format"
        default: "geojson"
        values: ["geojson", "csv", "shapefile"]
      - name: output
        type: string
        required: true
        description: "Output file path"
        short: "o"
    response:
      success_path: "features"
      error_path: "error.message"
    examples:
      - description: "Export parcels to GeoJSON"
        command: "arcgis-server data export --service Parcels --layer 0 -o parcels.geojson"

  # ---- Services Group ----

  - name: list
    description: "List available services"
    group: services
    aliases: ["ls"]
    request:
      method: GET
      path: "/"
    params:
      - name: type
        type: enum
        description: "Filter by service type"
        short: "t"
        values: ["MapServer", "FeatureServer", "GPServer", "ImageServer", "GeocodeServer"]
        source: query
      - name: folder
        type: string
        description: "Service folder"
        source: query
    response:
      success_path: "services"
      error_path: "error.message"
    examples:
      - description: "List all services"
        command: "arcgis-server services list"
      - description: "List only feature services"
        command: "arcgis-server services list -t FeatureServer"

  - name: info
    description: "Get detailed info about a service"
    group: services
    request:
      method: GET
      path: "/{service}/{type}"
    params:
      - name: service
        type: string
        required: true
        description: "Service name"
        source: path
      - name: type
        type: enum
        required: true
        description: "Service type"
        values: ["MapServer", "FeatureServer", "GPServer", "ImageServer"]
        source: path
    response:
      error_path: "error.message"
    examples:
      - description: "Get feature service info"
        command: "arcgis-server services info --service Transportation --type FeatureServer"
